<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOIBOI | 3D Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .content-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Mobile Specific Tweaks */
        @media (max-width: 640px) {
            .hero-title {
                font-size: 4rem;
                line-height: 1;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="content-overlay min-h-screen">
        
        <!-- Navigation -->
        <nav class="p-6 flex justify-between items-center interactive">

            <div class="flex gap-4">
                <a href="https://www.instagram.com/koiboi_edit_" target="_blank" class="w-10 h-10 glass flex items-center justify-center hover:bg-white/10 transition"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="w-10 h-10 glass flex items-center justify-center hover:bg-white/10 transition"><i class="fa-solid fa-headphones"></i></a>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="flex flex-col justify-center items-center text-center px-6 pt-20 pb-40">
            <h1 class="hero-title text-6xl md:text-9xl font-black neon-text uppercase tracking-tighter mb-4">
                YAKIR<br><span class="gradient-text">KOIBOI</span>
            </h1>
            <p class="text-gray-400 tracking-[0.4em] uppercase text-xs mb-12">Psytrance Architect & Visual Sorcerer</p>
            
            <div class="grid gap-4 w-full max-w-xs interactive">
                <a href="#music" class="glass p-4 text-xs font-bold tracking-widest uppercase hover:bg-purple-500/20 transition border-purple-500/30">Enter Music</a>
                <a href="#visuals" class="glass p-4 text-xs font-bold tracking-widest uppercase hover:bg-cyan-500/20 transition border-cyan-500/30">Visuals Gallery</a>
            </div>
        </section>

        <!-- Music List -->
        <section id="music" class="max-w-md mx-auto px-6 space-y-4 pb-40">
            <h2 class="text-[10px] font-bold tracking-[0.5em] uppercase text-center opacity-40 mb-8">Latest Releases</h2>
            <div class="space-y-3 interactive">
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="flex justify-between items-center glass p-5 hover:scale-105 transition-transform">
                    <span class="text-sm font-bold tracking-tight uppercase">Moonspot</span>
                    <span class="text-[9px] opacity-40 uppercase">Alteza</span>
                </a>
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="flex justify-between items-center glass p-5 hover:scale-105 transition-transform">
                    <span class="text-sm font-bold tracking-tight uppercase">Pragmatix Remix</span>
                    <span class="text-[9px] opacity-40 uppercase">Morion</span>
                </a>
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="flex justify-between items-center glass p-5 hover:scale-105 transition-transform">
                    <span class="text-sm font-bold tracking-tight uppercase">Lucid Mask</span>
                    <span class="text-[9px] opacity-40 uppercase">United Beats</span>
                </a>
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="flex justify-between items-center glass p-5 hover:scale-105 transition-transform">
                    <span class="text-sm font-bold tracking-tight uppercase">Shamanic Call</span>
                    <span class="text-[9px] opacity-40 uppercase">IONO Music</span>
                </a>
                <a href="https://www.beatport.com/artist/koi-boi/230769" target="_blank" class="flex justify-between items-center glass p-5 hover:scale-105 transition-transform">

        </section>

        <!-- Footer -->
        <footer class="py-10 text-center opacity-20 text-[10px] tracking-widest uppercase">
            &copy; 2026 // Built in the Matrix
        </footer>

    </div>

    <!-- THREE.JS & CANNON.JS for 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles, torus;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Add Psychedelic Torus
            const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 200, 32);
            const material = new THREE.MeshNormalMaterial({ wireframe: true });
            torus = new THREE.Mesh(geometry, material);
            scene.add(torus);

            // Add Moving Space Particles
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 2000;
            const posArray = new Float32Array(pCount * 3);

            for(let i=0; i < pCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 15;
            }

            pGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const pMaterial = new THREE.PointsMaterial({ size: 0.005, color: '#a855f7' });
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            torus.rotation.x += 0.01;
            torus.rotation.y += 0.01;
            
            particles.rotation.y += 0.002;
            particles.position.z += 0.01;
            if(particles.position.z > 2) particles.position.z = 0;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
